{% comment %}
Tab navigation partial for the unified "Análise" section.
Usage: {% include 'accounting/_analysis_tabs.html' with current='dre' %}
Valid current values: dashboard, dre, cash_flow, break_even, conciliacao
{% endcomment %}
<div class="max-w-screen-2xl mx-auto px-4 pt-4">
  <div class="border-b border-gray-200 dark:border-gray-700 mb-4">
    <nav class="-mb-px flex flex-wrap gap-1" aria-label="Tabs">
      <a href="{% url 'financial-dashboard' %}"
         class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold border-b-2 transition
         {% if current == 'dashboard' %}border-emerald-500 text-emerald-700 dark:text-emerald-400{% else %}border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 hover:border-gray-300{% endif %}">
        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
      </a>
      <a href="{% url 'accounting:dre' %}"
         class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold border-b-2 transition
         {% if current == 'dre' %}border-emerald-500 text-emerald-700 dark:text-emerald-400{% else %}border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 hover:border-gray-300{% endif %}">
        <i data-lucide="bar-chart-3" class="w-4 h-4"></i> DRE
      </a>
      <a href="{% url 'accounting:cash_flow' %}"
         class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold border-b-2 transition
         {% if current == 'cash_flow' %}border-emerald-500 text-emerald-700 dark:text-emerald-400{% else %}border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 hover:border-gray-300{% endif %}">
        <i data-lucide="trending-up" class="w-4 h-4"></i> Fluxo de Caixa
      </a>
      <a href="{% url 'accounting:break_even' %}"
         class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold border-b-2 transition
         {% if current == 'break_even' %}border-emerald-500 text-emerald-700 dark:text-emerald-400{% else %}border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 hover:border-gray-300{% endif %}">
        <i data-lucide="gauge" class="w-4 h-4"></i> Break-Even
      </a>
      <a href="{% url 'accounting:bank_statement_list' %}"
         class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold border-b-2 transition
         {% if current == 'conciliacao' %}border-emerald-500 text-emerald-700 dark:text-emerald-400{% else %}border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 hover:border-gray-300{% endif %}">
        <i data-lucide="landmark" class="w-4 h-4"></i> Conciliação
      </a>
    </nav>
  </div>
</div>
