<header
    x-data="{
        darkMode: false,
        themePress: false,
        init() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            this.darkMode = savedTheme ? savedTheme === 'dark' : prefersDark;
            document.documentElement.classList.toggle('dark', this.darkMode);
            if (window.lucide) {
                this.$nextTick(() => lucide.createIcons());
            }
        },
        toggleTheme() {
            this.themePress = true;
            this.darkMode = !this.darkMode;
            document.documentElement.classList.toggle('dark', this.darkMode);
            localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
            setTimeout(() => {
                this.themePress = false;
            }, 160);
        }
    }"
    class="top-0 flex h-20 w-full items-center justify-between border-b border-gray-200 bg-white px-4 shadow-sm sm:px-6 dark:border-gray-700 dark:bg-gray-800"
>
    <div class="flex items-center gap-3">
        <button aria-label="Open menu" class="flex h-8 w-8 items-center justify-center rounded-lg text-gray-600 transition-colors hover:bg-gray-100 hover:text-gray-900 dark:text-gray-300 dark:hover:bg-gray-700/70 dark:hover:text-white lg:hidden">
            <i data-lucide="menu" class="h-5 w-5" aria-hidden="true"></i>
        </button>
    </div>

    <div class="flex items-center gap-2">

        <div class="mx-1 hidden h-6 w-px bg-gray-200 sm:block dark:bg-gray-700"></div>

        <button
            type="button"
            @click="toggleTheme()"
            :aria-label="darkMode ? 'Mudar para modo claro' : 'Mudar para modo escuro'"
            :aria-pressed="darkMode"
            :class="themePress ? 'scale-95' : 'scale-100'"
            class="flex h-8 w-8 items-center justify-center rounded-lg text-gray-600 transition-[transform,colors] duration-150 hover:bg-gray-100 hover:text-gray-900 dark:text-gray-300 dark:hover:bg-gray-700/70 dark:hover:text-white cursor-pointer"
        >
            <i x-show="!darkMode" x-cloak data-lucide="moon" class="h-4 w-4" aria-hidden="true"></i>
            <i x-show="darkMode" x-cloak data-lucide="sun" class="h-4 w-4" aria-hidden="true"></i>
        </button>

        <button aria-label="Notifications" class="relative flex h-8 w-8 items-center justify-center rounded-lg text-gray-600 transition-colors hover:bg-gray-100 hover:text-gray-900 dark:text-gray-300 dark:hover:bg-gray-700/70 dark:hover:text-white cursor-pointer" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="radix-_R_mbpflb_" data-state="closed" data-slot="popover-trigger">
            <i data-lucide="bell" class="h-4 w-4" aria-hidden="true"></i>
            <span class="absolute ltr:right-1.5 rtl:left-1.5 top-1.5 h-2 w-2 rounded-full bg-rose-500"></span>
        </button>

        <button aria-label="User menu" class="ms-1 flex h-8 w-8 items-center justify-center rounded-full bg-indigo-100 text-xs font-semibold text-indigo-700 transition-colors hover:bg-indigo-200 dark:bg-indigo-900/30 dark:text-indigo-200 dark:hover:bg-indigo-900/50 cursor-pointer" type="button" id="radix-_R_qbpflb_" aria-haspopup="menu" aria-expanded="false" data-state="closed" data-slot="dropdown-menu-trigger">
            AS
        </button>
    </div>
</header>
