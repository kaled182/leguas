version: '3.9'

services:
  # Base de dados MySQL
  db:
    image: mysql:8.0
    container_name: leguas_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: leguas_db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_dev}
      MYSQL_USER: leguas_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-leguas_password_dev}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro  # relative ao deploy/dev/
    command: --default-authentication-plugin=mysql_native_password --sql-mode=STRICT_TRANS_TABLES --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - leguas_network

  # Redis (para cache e sessões)
  redis:
    image: redis:7-alpine
    container_name: leguas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
    networks:
      - leguas_network

  # Aplicação Django
  web:
    build:
      context: ../..
      dockerfile: deploy/dev/Dockerfile
    container_name: leguas_web
    restart: unless-stopped
    command: gunicorn my_project.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 600 --graceful-timeout 60 --reload
    volumes:
      - ../..:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    env_file:
      - ../../.env.docker
    environment:
      - DEBUG=True
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=leguas_db
      - DB_USER=leguas_user
      - DB_PASSWORD=${DB_PASSWORD:-leguas_password_dev}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leguas_network

  # Tailwind CSS (desenvolvimento)
  tailwind:
    build:
      context: ../..
      dockerfile: deploy/dev/Dockerfile
    container_name: leguas_tailwind
    restart: unless-stopped
    command: python manage.py tailwind start
    volumes:
      - ../..:/app
    env_file:
      - ../../.env.docker
    environment:
      - DEBUG=True
    depends_on:
      - web
    networks:
      - leguas_network

  # WPPConnect Server (WhatsApp Integration) — build local v1.41.x
  wppconnect:
    build:
      context: ../..
      dockerfile: deploy/dev/wppconnect/Dockerfile
    image: leguas_wppconnect_custom:latest
    container_name: leguas_wppconnect
    restart: unless-stopped
    ports:
      - "21465:21465"
    volumes:
      - wppconnect_store:/wppserver/userDataDir
      - wppconnect_tokens:/wppserver/tokens
    environment:
      SERVER_PORT: 21465
      SECRET_KEY: "${WPPCONNECT_SECRET:-THISISMYSECURETOKEN}"
      TOKEN: "${WPPCONNECT_TOKEN:-change-me-token}"
      DEBUG: "false"
      DEL_INSTANCE: "false"
      AUTO_CLOSE_INTERVAL: "300000"
      CONFIG_SESSION_PHONE_CLIENT: "Chrome"
      CONFIG_SESSION_PHONE_NAME: "Leguas"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: "http://leguas_wppconnect_bridge:3500/webhook/wppconnect"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      WEBHOOK_GLOBAL_EVENTS: "onMessage,onAnyMessage"
      CHATWOOT_ENABLED: "false"
      LOG_LEVEL: "debug"
      LOG_COLOR: "true"
      LOG_BAILEYS: "error"
      STORE_MESSAGES: "true"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"
      CLEAN_STORE_CLEANING_INTERVAL: "7200"
      CLEAN_STORE_MESSAGES: "true"
      CLEAN_STORE_MESSAGE_UP_TO: "false"
      CLEAN_STORE_CONTACTS: "true"
      CLEAN_STORE_CHATS: "true"
    networks:
      - leguas_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:21465/healthz', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Celery Worker (tarefas assíncronas)
  celery_worker:
    build:
      context: ../..
      dockerfile: deploy/dev/Dockerfile
    container_name: leguas_celery_worker
    restart: unless-stopped
    command: celery -A my_project worker -l info --concurrency=2
    volumes:
      - ../..:/app
    env_file:
      - ../../.env.docker
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=leguas_db
      - DB_USER=leguas_user
      - DB_PASSWORD=${DB_PASSWORD:-leguas_password_dev}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leguas_network

  # Celery Beat (agendador de tarefas)
  celery_beat:
    build:
      context: ../..
      dockerfile: deploy/dev/Dockerfile
    container_name: leguas_celery_beat
    restart: unless-stopped
    command: celery -A my_project beat -l info
    volumes:
      - ../..:/app
    env_file:
      - ../../.env.docker
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=leguas_db
      - DB_USER=leguas_user
      - DB_PASSWORD=${DB_PASSWORD:-leguas_password_dev}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leguas_network


networks:
  leguas_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  static_volume:
  media_volume:
  wppconnect_store:
  wppconnect_tokens:
