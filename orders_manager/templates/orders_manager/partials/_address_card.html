<div class="p-4 bg-gray-50 dark:bg-gray-900/50 rounded-lg border border-gray-200 dark:border-gray-700">
  <div class="flex items-start gap-3 text-sm">
    <i data-lucide="{{ icon|default:'home' }}" class="w-4 h-4 mt-0.5 flex-shrink-0 {{ icon_class|default:'text-blue-600 dark:text-blue-400' }}"></i>
    <div class="flex-1 min-w-0">
      <span class="font-semibold text-gray-900 dark:text-gray-100 block mb-1 text-xs uppercase tracking-wide">{{ title }}</span>
      <span class="block break-words text-gray-700 dark:text-gray-300 text-sm leading-snug">{{ address|default:'N/A' }}</span>
    </div>
  </div>
</div>
