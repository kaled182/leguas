<div class="p-4 {{ bg_class|default:'bg-green-50 dark:bg-green-900/20' }} rounded-lg border {{ border_class|default:'border-green-200 dark:border-green-800' }}">
  <div class="flex items-start gap-3 text-sm {{ text_class|default:'text-green-900 dark:text-green-100' }} mb-3">
    <i data-lucide="map-pin" class="w-4 h-4 mt-0.5 flex-shrink-0"></i>
    <div class="flex-1">
      <span class="font-semibold block mb-1 text-xs uppercase tracking-wide">{{ title }}</span>
      <span class="block break-words font-mono text-xs">{{ lat }}{% if lng %}, {{ lng }}{% endif %}</span>
    </div>
  </div>
  {% if show_button %}
  <button class="open-gmaps-btn w-full px-3 py-2 bg-green-600 text-white rounded-lg text-xs font-medium hover:bg-green-700 transition-colors shadow-sm flex items-center justify-center gap-2" data-lat="{{ lat }}" data-lng="{{ lng }}">
    <i data-lucide="external-link" class="w-3 h-3"></i>
    <span>{{ button_text|default:'Abrir no Google Maps' }}</span>
  </button>
  {% endif %}
</div>
