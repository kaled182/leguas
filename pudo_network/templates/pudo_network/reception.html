{% load static %}<!DOCTYPE html>
<html lang="pt-PT" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receção · {{ store.numero }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="h-full bg-slate-50">

  <header class="bg-white border-b border-slate-200">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="{% url 'pudo_network:dashboard' %}" class="flex items-center gap-2 text-slate-600 hover:text-slate-900">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        <span class="text-sm">{{ store.numero }} · {{ store.nome }}</span>
      </a>
      <span class="text-xs font-semibold text-sky-700 bg-sky-50 px-2.5 py-1 rounded-full">Receção</span>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8"
        x-data="reception('{% url 'pudo_network:reception' %}', '{{ csrf_token }}')">

    <form @submit.prevent="scan()" class="bg-white rounded-2xl border border-slate-200 p-6">
      <label class="block text-sm font-semibold text-slate-700 mb-2">
        Ler código do pacote
      </label>
      <div class="relative">
        <i data-lucide="scan-barcode" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
        <input x-model="code" x-ref="input" autofocus autocomplete="off"
               placeholder="Aponte o leitor ou digite o código…"
               class="w-full pl-11 pr-3 py-3 bg-slate-50 border border-slate-200 rounded-xl text-lg text-slate-900 focus:bg-white focus:border-sky-500 focus:ring-2 focus:ring-sky-100 transition">
      </div>
      <p class="text-xs text-slate-400 mt-2">
        O leitor de código de barras funciona como teclado — cada leitura envia
        automaticamente (Enter). No telemóvel, use a câmara.
      </p>
    </form>

    <div class="mt-6 flex items-center justify-between text-sm text-slate-500">
      <span>Rececionados nesta sessão: <b x-text="items.length"></b></span>
      <span x-show="lastError" class="text-rose-600" x-text="lastError"></span>
    </div>

    <ul class="mt-3 space-y-2">
      <template x-for="item in items" :key="item.key">
        <li class="flex items-center justify-between bg-white border border-slate-200 rounded-xl px-4 py-3">
          <div class="flex items-center gap-3">
            <i data-lucide="package-check" class="w-5 h-5 text-emerald-600"></i>
            <div>
              <div class="font-semibold text-slate-900" x-text="item.tracking_ref"></div>
              <div class="text-xs text-slate-400" x-text="item.status"></div>
            </div>
          </div>
          <span x-show="item.idempotent"
                class="text-xs text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full">
            já registado
          </span>
        </li>
      </template>
    </ul>
  </main>

  <script>
    // UUIDv4 que funciona também em HTTP (crypto.randomUUID exige HTTPS).
    function uuidv4() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }
    function reception(url, csrf) {
      return {
        code: '', items: [], lastError: '',
        async scan() {
          const ref = (this.code || '').trim();
          if (!ref) return;
          this.code = '';
          this.lastError = '';
          const body = new URLSearchParams({
            tracking_ref: ref,
            uuid: uuidv4(),
          });
          try {
            const r = await fetch(url, {
              method: 'POST',
              headers: {
                'X-CSRFToken': csrf,
                'Content-Type': 'application/x-www-form-urlencoded',
              },
              body,
            });
            const data = await r.json();
            if (!data.success) { this.lastError = data.error || 'Erro'; return; }
            this.items.unshift({
              key: Date.now() + '-' + ref,
              tracking_ref: data.tracking_ref,
              status: data.status,
              idempotent: data.idempotent,
            });
            this.$nextTick(() => lucide.createIcons());
          } catch (e) {
            this.lastError = 'Falha de rede — tente de novo.';
          } finally {
            this.$refs.input.focus();
          }
        },
      };
    }
    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>
</body>
</html>
