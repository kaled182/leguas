{% load static %}<!DOCTYPE html>
<html lang="pt-PT" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receção offline · {{ store.numero }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; } [x-cloak]{display:none!important}</style>
</head>
<body class="h-full bg-slate-50">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="{% url 'pudo_network:dashboard' %}" class="flex items-center gap-2 text-slate-600 hover:text-slate-900">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        <span class="text-sm">{{ store.numero }} · {{ store.nome }}</span>
      </a>
      <span class="text-xs font-semibold text-fuchsia-700 bg-fuchsia-50 px-2.5 py-1 rounded-full">Receção offline</span>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8"
        x-data="scanOffline('{% url 'pudo_network:scan_offline' %}', '{{ csrf_token }}')">

    <div class="bg-white rounded-2xl border border-slate-200 p-6">
      <p class="text-sm text-slate-500 mb-3">
        Leia o <b>QR assinado</b> do estafeta (funciona sem rede do lado dele).
        O servidor valida assinatura, validade e uso-único antes de aceitar.
      </p>
      <form @submit.prevent="submit()">
        <textarea x-model="payload" x-ref="input" rows="4" autofocus
                  placeholder="Conteúdo do QR (JSON assinado)…"
                  class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm font-mono focus:bg-white focus:border-fuchsia-500 focus:ring-2 focus:ring-fuchsia-100"></textarea>
        <button class="mt-3 px-4 py-2 bg-fuchsia-600 text-white rounded-xl text-sm font-semibold">
          Validar e rececionar
        </button>
      </form>
      <p x-show="error" x-cloak class="mt-3 text-sm text-rose-600" x-text="error"></p>
    </div>

    <ul class="mt-4 space-y-2">
      <template x-for="item in items" :key="item.key">
        <li class="flex items-center justify-between bg-white border border-slate-200 rounded-xl px-4 py-3">
          <div class="flex items-center gap-3">
            <i data-lucide="shield-check" class="w-5 h-5 text-emerald-600"></i>
            <div>
              <div class="font-semibold text-slate-900" x-text="item.tracking_ref"></div>
              <div class="text-xs text-slate-400" x-text="item.status"></div>
            </div>
          </div>
          <span x-show="item.idempotent" class="text-xs text-amber-600">repetido</span>
        </li>
      </template>
    </ul>
  </main>

  <script>
    function scanOffline(url, csrf) {
      return {
        payload: '', items: [], error: '',
        async submit() {
          const raw = (this.payload || '').trim();
          if (!raw) return;
          this.error = '';
          const body = new URLSearchParams({ payload: raw });
          try {
            const r = await fetch(url, {
              method: 'POST',
              headers: { 'X-CSRFToken': csrf, 'Content-Type': 'application/x-www-form-urlencoded' },
              body,
            });
            const data = await r.json();
            if (!data.success) { this.error = data.error || 'Erro'; return; }
            this.items.unshift({
              key: Date.now(), tracking_ref: data.tracking_ref,
              status: data.status, idempotent: data.idempotent,
            });
            this.payload = '';
            this.$nextTick(() => lucide.createIcons());
          } catch (e) { this.error = 'Falha de rede.'; }
          finally { this.$refs.input.focus(); }
        },
      };
    }
    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>
</body>
</html>
