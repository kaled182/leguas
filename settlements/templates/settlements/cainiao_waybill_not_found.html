{% extends 'settlements/base.html' %}
{% block title %}Waybill não encontrado{% endblock %}
{% block content %}
<div class="p-8 max-w-xl mx-auto text-center">
  <div class="bg-white dark:bg-gray-800 rounded-xl border border-red-200 dark:border-red-700 p-8">
    <i data-lucide="package-x" class="w-12 h-12 mx-auto text-red-500"></i>
    <h1 class="text-2xl font-bold mt-4 text-gray-900 dark:text-white">Waybill não encontrado</h1>
    <p class="mt-2 font-mono text-sm text-gray-500">{{ waybill }}</p>
    <p class="mt-4 text-sm text-gray-600 dark:text-gray-400">
      Este waybill não existe na base de dados Cainiao. Verifique se está correcto ou se o Operation Update já foi importado.
    </p>
    <a href="javascript:history.back()" class="inline-block mt-6 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700">
      ← Voltar
    </a>
  </div>
</div>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>
{% endblock %}
